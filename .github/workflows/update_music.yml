name: Update Last.fm Stats

on:
  schedule:
    - cron: '0 */3 * * *' # Every 3 hours
  workflow_dispatch: 

# CRITICAL: Grant permission to push changes back to the repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so git push works better

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Sync Script
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python sync_lastfm.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          
          # 1. Stage the file
          git add songs.json
          
          # 2. Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to songs.json. Skipping push."
          else
            # 3. Commit locally first
            git commit -m "chore: update music stats"
            
            # 4. Pull remote changes and rebase your commit on top of them
            git pull --rebase origin main
            
            # 5. Push to the repository
            git push origin main
          fi
